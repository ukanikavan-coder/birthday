<!DOCTYPE html>
<html>
<head>
<title>Happy Birthday</title>
<style>
body{
    background: linear-gradient(to right, #c6070d, #fad0c4);
    text-align:center;
    font-family: Arial, sans-serif;
}

.card{
    background:white;
    width:400px;
    margin:120px auto;
    padding:30px;
    border-radius:15px;
    box-shadow:0 10px 20px rgba(0,0,0,0.2);
}

h1{
    color:#ff4081;
}

p{
    font-size:18px;
}
</style>
</head>

<body>

<div class="card">
    <h1>🎉 Happy Birthday 🎂</h1>
    <h2>Dear My Friend</h2>
    <p>May your day be filled with happiness, fun and lots of cake!</p>
    <p>Have an amazing year ahead! 🎈</p>
</div>

</body>
</html>
